<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="520" viewBox="0 0 780 520">
<defs>
  <style>
    .cg-title{font-family:'Segoe UI',Arial,sans-serif;font-size:15px;font-weight:bold;fill:#0f172a}
    .cg-q{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;font-weight:bold;fill:#4338ca}
    .cg-h{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;font-weight:bold}
    .cg-s{font-family:'Segoe UI',Arial,sans-serif;font-size:10px;fill:#475569}
    .cg-tip{font-family:'Segoe UI',Arial,sans-serif;font-size:9.5px;fill:#64748b;font-style:italic}
    .cg-note{font-family:'Segoe UI',Arial,sans-serif;font-size:9.5px;fill:#64748b}
  </style>
  <marker id="cga" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0,7 2.5,0 5" fill="#94a3b8"/>
  </marker>
</defs>

<text x="390" y="24" text-anchor="middle" class="cg-title">Clustering Method Selection Guide</text>

<!-- Top question -->
<rect x="230" y="40" width="320" height="40" rx="10" fill="#eff6ff" stroke="#6366f1" stroke-width="1.6"/>
<text x="390" y="65" text-anchor="middle" class="cg-q">What shape are your clusters?</text>
<text x="390" y="90" text-anchor="middle" class="cg-tip">(visualise first with scatter plot or PCA 2D projection)</text>

<!-- Arrows down to 4 options -->
<line x1="140" y1="80" x2="140" y2="115" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#cga)"/>
<line x1="320" y1="80" x2="320" y2="115" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#cga)"/>
<line x1="500" y1="80" x2="500" y2="115" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#cga)"/>
<line x1="660" y1="80" x2="660" y2="115" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#cga)"/>

<!-- Branch line -->
<line x1="140" y1="80" x2="660" y2="80" stroke="#94a3b8" stroke-width="1.3"/>
<line x1="390" y1="80" x2="390" y2="75" stroke="#94a3b8" stroke-width="1.3"/>

<!-- ─── Column 1: K-Means ─── -->
<rect x="40" y="120" width="200" height="44" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4"/>
<text x="140" y="140" text-anchor="middle" class="cg-h" fill="#1e40af">Roughly Spherical /</text>
<text x="140" y="155" text-anchor="middle" class="cg-h" fill="#1e40af">Similar Size</text>
<line x1="140" y1="164" x2="140" y2="185" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#cga)"/>
<rect x="45" y="190" width="190" height="34" rx="6" fill="#2563eb" stroke="none"/>
<text x="140" y="212" text-anchor="middle" class="cg-h" fill="#fff">→ K-Means / K-Means++</text>
<text x="140" y="240" text-anchor="middle" class="cg-s">Fast, scalable to millions of rows</text>
<text x="140" y="254" text-anchor="middle" class="cg-s">Must specify k beforehand</text>
<text x="140" y="268" text-anchor="middle" class="cg-s">Use elbow or silhouette to choose k</text>

<!-- ─── Column 2: DBSCAN ─── -->
<rect x="220" y="120" width="200" height="44" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.4"/>
<text x="320" y="140" text-anchor="middle" class="cg-h" fill="#92400e">Arbitrary Shape /</text>
<text x="320" y="155" text-anchor="middle" class="cg-h" fill="#92400e">Noise / Outliers</text>
<line x1="320" y1="164" x2="320" y2="185" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#cga)"/>
<rect x="225" y="190" width="190" height="34" rx="6" fill="#f59e0b" stroke="none"/>
<text x="320" y="212" text-anchor="middle" class="cg-h" fill="#fff">→ DBSCAN / HDBSCAN</text>
<text x="320" y="240" text-anchor="middle" class="cg-s">No k to specify</text>
<text x="320" y="254" text-anchor="middle" class="cg-s">Handles dense and sparse regions</text>
<text x="320" y="268" text-anchor="middle" class="cg-s">Marks outliers as noise (label −1)</text>

<!-- ─── Column 3: Hierarchical ─── -->
<rect x="400" y="120" width="200" height="44" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
<text x="500" y="140" text-anchor="middle" class="cg-h" fill="#166534">Need Hierarchy /</text>
<text x="500" y="155" text-anchor="middle" class="cg-h" fill="#166534">Unknown k</text>
<line x1="500" y1="164" x2="500" y2="185" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#cga)"/>
<rect x="405" y="190" width="190" height="34" rx="6" fill="#16a34a" stroke="none"/>
<text x="500" y="212" text-anchor="middle" class="cg-h" fill="#fff">→ Agglomerative (Ward)</text>
<text x="500" y="240" text-anchor="middle" class="cg-s">Dendrogram shows merge tree</text>
<text x="500" y="254" text-anchor="middle" class="cg-s">Cut at any height to get k clusters</text>
<text x="500" y="268" text-anchor="middle" class="cg-s">Best for small–medium datasets</text>

<!-- ─── Column 4: GMM ─── -->
<rect x="580" y="120" width="200" height="44" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.4"/>
<text x="680" y="140" text-anchor="middle" class="cg-h" fill="#9d174d">Soft / Probabilistic</text>
<text x="680" y="155" text-anchor="middle" class="cg-h" fill="#9d174d">Assignments</text>
<line x1="680" y1="164" x2="680" y2="185" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#cga)"/>
<rect x="585" y="190" width="190" height="34" rx="6" fill="#ec4899" stroke="none"/>
<text x="680" y="212" text-anchor="middle" class="cg-h" fill="#fff">→ GMM</text>
<text x="680" y="240" text-anchor="middle" class="cg-s">Each point gets P(cluster k | x)</text>
<text x="680" y="254" text-anchor="middle" class="cg-s">Useful when clusters overlap</text>
<text x="680" y="268" text-anchor="middle" class="cg-s">Full covariance → non-spherical</text>

<!-- Quick-pick bar -->
<rect x="40" y="300" width="740" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
<text x="390" y="318" text-anchor="middle" class="cg-h" fill="#334155">Quick-pick</text>
<text x="390" y="335" text-anchor="middle" class="cg-note">n &lt; 50k + spherical → K-Means  |  noise / arbitrary shape → DBSCAN  |  hierarchy needed → Ward  |  soft / probabilistic → GMM</text>

<!-- Validation bar -->
<rect x="40" y="360" width="740" height="44" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
<text x="390" y="378" text-anchor="middle" class="cg-h" fill="#92400e">Always validate with</text>
<text x="390" y="395" text-anchor="middle" class="cg-note">Silhouette score (higher → better separation)  |  Inertia / WCSS (lower → tighter)  |  Domain expert review of cluster meaning</text>

<!-- Footer note -->
<text x="390" y="430" text-anchor="middle" class="cg-tip">If clusters overlap or have uncertainty, consider GMM for probabilistic membership</text>
</svg>