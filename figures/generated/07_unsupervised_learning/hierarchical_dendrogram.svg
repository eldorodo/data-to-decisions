<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="440" viewBox="0 0 860 440">
<defs>
  <style>
    .hd-title{font-family:'Segoe UI',Arial,sans-serif;font-size:15px;font-weight:bold;fill:#0f172a}
    .hd-h{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;font-weight:bold}
    .hd-s{font-family:'Segoe UI',Arial,sans-serif;font-size:10.5px;fill:#475569}
    .hd-ax{font-family:'Segoe UI',Arial,sans-serif;font-size:10px;fill:#64748b}
    .hd-leaf{font-family:'Segoe UI',Arial,sans-serif;font-size:10px;fill:#334155}
    .hd-note{font-family:'Segoe UI',Arial,sans-serif;font-size:9.5px;fill:#64748b;font-style:italic}
  </style>
</defs>

<text x="430" y="24" text-anchor="middle" class="hd-title">Agglomerative Hierarchical Clustering — Dendrogram</text>

<!-- ═══ LEFT: Dendrogram ═══ -->
<rect x="30" y="40" width="480" height="380" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

<!-- Y axis label -->
<text x="50" y="230" text-anchor="middle" class="hd-ax" transform="rotate(-90 50 230)">Distance</text>
<!-- Y axis ticks -->
<line x1="68" y1="60" x2="68" y2="370" stroke="#cbd5e1" stroke-width="1"/>
<text x="63" y="370" text-anchor="end" class="hd-ax">0</text>
<text x="63" y="308" text-anchor="end" class="hd-ax">1</text>
<text x="63" y="246" text-anchor="end" class="hd-ax">2</text>
<text x="63" y="184" text-anchor="end" class="hd-ax">3</text>
<text x="63" y="122" text-anchor="end" class="hd-ax">4</text>
<text x="63" y="60" text-anchor="end" class="hd-ax">5</text>
<line x1="64" y1="370" x2="68" y2="370" stroke="#94a3b8" stroke-width="1"/>
<line x1="64" y1="308" x2="68" y2="308" stroke="#94a3b8" stroke-width="1"/>
<line x1="64" y1="246" x2="68" y2="246" stroke="#94a3b8" stroke-width="1"/>
<line x1="64" y1="184" x2="68" y2="184" stroke="#94a3b8" stroke-width="1"/>
<line x1="64" y1="122" x2="68" y2="122" stroke="#94a3b8" stroke-width="1"/>
<line x1="64" y1="60" x2="68" y2="60" stroke="#94a3b8" stroke-width="1"/>

<!-- Leaf labels -->
<text x="120" y="388" text-anchor="middle" class="hd-leaf">A</text>
<text x="180" y="388" text-anchor="middle" class="hd-leaf">B</text>
<text x="260" y="388" text-anchor="middle" class="hd-leaf">C</text>
<text x="340" y="388" text-anchor="middle" class="hd-leaf">D</text>
<text x="420" y="388" text-anchor="middle" class="hd-leaf">E</text>

<!-- Merge A-B at distance 0.8 -->
<line x1="120" y1="370" x2="120" y2="320" stroke="#3b82f6" stroke-width="2"/>
<line x1="180" y1="370" x2="180" y2="320" stroke="#3b82f6" stroke-width="2"/>
<line x1="120" y1="320" x2="180" y2="320" stroke="#3b82f6" stroke-width="2"/>

<!-- Merge C-D at distance 1.2 -->
<line x1="260" y1="370" x2="260" y2="296" stroke="#22c55e" stroke-width="2"/>
<line x1="340" y1="370" x2="340" y2="296" stroke="#22c55e" stroke-width="2"/>
<line x1="260" y1="296" x2="340" y2="296" stroke="#22c55e" stroke-width="2"/>

<!-- Merge (AB)-(CD) at distance 2.5 -->
<line x1="150" y1="320" x2="150" y2="215" stroke="#8b5cf6" stroke-width="2"/>
<line x1="300" y1="296" x2="300" y2="215" stroke="#8b5cf6" stroke-width="2"/>
<line x1="150" y1="215" x2="300" y2="215" stroke="#8b5cf6" stroke-width="2"/>

<!-- Merge (ABCD)-E at distance 4.2 -->
<line x1="225" y1="215" x2="225" y2="110" stroke="#f59e0b" stroke-width="2"/>
<line x1="420" y1="370" x2="420" y2="110" stroke="#f59e0b" stroke-width="2"/>
<line x1="225" y1="110" x2="420" y2="110" stroke="#f59e0b" stroke-width="2"/>

<!-- Cut line -->
<line x1="75" y1="246" x2="490" y2="246" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="480" y="240" text-anchor="end" class="hd-h" fill="#dc2626">cut → 3 clusters</text>

<!-- ═══ RIGHT: Explanation ═══ -->
<rect x="530" y="40" width="310" height="380" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="685" y="68" text-anchor="middle" class="hd-h" fill="#1e40af">How to Read a Dendrogram</text>

<text x="550" y="95" class="hd-s">1. Each leaf at the bottom is a data point (or sample).</text>
<text x="550" y="115" class="hd-s">2. Horizontal lines connect points/clusters that merge.</text>
<text x="550" y="135" class="hd-s">3. The height of the merge = the distance between them.</text>
<text x="550" y="155" class="hd-s">4. A horizontal cut line gives the number of clusters:</text>
<text x="565" y="175" class="hd-s">— cut below distance 2 → {A,B}, {C,D}, {E} = 3 clusters</text>
<text x="565" y="195" class="hd-s">— cut below distance 1 → {A,B}, {C}, {D}, {E} = 4 clusters</text>

<text x="550" y="230" class="hd-h" fill="#1e40af">Linkage Methods</text>
<rect x="550" y="240" width="270" height="28" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="0.8"/>
<text x="685" y="259" text-anchor="middle" class="hd-s"><tspan font-weight="bold" fill="#1e40af">Ward</tspan> — minimises within-cluster variance (default)</text>
<rect x="550" y="274" width="270" height="28" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8"/>
<text x="685" y="293" text-anchor="middle" class="hd-s"><tspan font-weight="bold" fill="#166534">Complete</tspan> — max distance between cluster pairs</text>
<rect x="550" y="308" width="270" height="28" rx="4" fill="#fef3c7" stroke="#fde68a" stroke-width="0.8"/>
<text x="685" y="327" text-anchor="middle" class="hd-s"><tspan font-weight="bold" fill="#92400e">Average</tspan> — mean pairwise distance</text>
<rect x="550" y="342" width="270" height="28" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8"/>
<text x="685" y="361" text-anchor="middle" class="hd-s"><tspan font-weight="bold" fill="#991b1b">Single</tspan> — min distance (can chain)</text>

<text x="685" y="395" text-anchor="middle" class="hd-note">O(n²) memory / O(n³) time — best for small-medium data</text>
</svg>