<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <!-- Clip for left-only (A - B) -->
    <clipPath id="leftOnly">
      <rect x="20" y="30" width="100" height="120"/>
    </clipPath>
    <!-- Clip for right-only (B - A) -->
    <clipPath id="rightOnly">
      <rect x="120" y="30" width="100" height="120"/>
    </clipPath>
    <!-- Clip for intersection (A ∩ B) -->
    <clipPath id="clipA1"><circle cx="88" cy="90" r="48"/></clipPath>
    <clipPath id="clipA2"><circle cx="88" cy="90" r="48"/></clipPath>
    <clipPath id="clipA3"><circle cx="88" cy="90" r="48"/></clipPath>
    <clipPath id="clipA4"><circle cx="88" cy="90" r="48"/></clipPath>
    <clipPath id="clipB1"><circle cx="132" cy="90" r="48"/></clipPath>
    <clipPath id="clipB2"><circle cx="132" cy="90" r="48"/></clipPath>
    <clipPath id="clipB3"><circle cx="132" cy="90" r="48"/></clipPath>
    <clipPath id="clipB4"><circle cx="132" cy="90" r="48"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="820" height="440" rx="12" fill="#ffffff" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="410" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">SQL JOIN Types</text>

  <!-- ══════════ INNER JOIN ══════════ -->
  <g transform="translate(15, 52)">
    <text x="110" y="10" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">INNER JOIN</text>
    <!-- Circle A outline -->
    <circle cx="88" cy="90" r="48" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
    <!-- Circle B outline -->
    <circle cx="132" cy="90" r="48" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
    <!-- Intersection highlight -->
    <circle cx="132" cy="90" r="48" clip-path="url(#clipA1)" fill="#7c3aed" opacity="0.35"/>
    <!-- Labels -->
    <text x="72" y="94" text-anchor="middle" font-size="11" fill="#64748b">A</text>
    <text x="148" y="94" text-anchor="middle" font-size="11" fill="#64748b">B</text>
    <!-- Description -->
    <text x="110" y="155" text-anchor="middle" font-size="11" fill="#334155">Only matching rows</text>
    <text x="110" y="170" text-anchor="middle" font-size="11" fill="#334155">from both tables</text>
  </g>

  <!-- ══════════ LEFT JOIN ══════════ -->
  <g transform="translate(215, 52)">
    <text x="110" y="10" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">LEFT JOIN</text>
    <!-- Circle A filled -->
    <circle cx="88" cy="90" r="48" fill="#2563eb" opacity="0.3"/>
    <!-- Circle B outline only -->
    <circle cx="132" cy="90" r="48" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
    <!-- Intersection also filled (part of left) -->
    <circle cx="132" cy="90" r="48" clip-path="url(#clipA2)" fill="#2563eb" opacity="0.3"/>
    <!-- Circle A outline on top -->
    <circle cx="88" cy="90" r="48" fill="none" stroke="#2563eb" stroke-width="1.2"/>
    <!-- Labels -->
    <text x="72" y="94" text-anchor="middle" font-size="11" fill="#1e40af">A</text>
    <text x="148" y="94" text-anchor="middle" font-size="11" fill="#64748b">B</text>
    <!-- Description -->
    <text x="110" y="155" text-anchor="middle" font-size="11" fill="#334155">All rows from A,</text>
    <text x="110" y="170" text-anchor="middle" font-size="11" fill="#334155">matched from B (NULL if none)</text>
  </g>

  <!-- ══════════ RIGHT JOIN ══════════ -->
  <g transform="translate(415, 52)">
    <text x="110" y="10" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">RIGHT JOIN</text>
    <!-- Circle A outline only -->
    <circle cx="88" cy="90" r="48" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
    <!-- Circle B filled -->
    <circle cx="132" cy="90" r="48" fill="#22c55e" opacity="0.3"/>
    <!-- Intersection also filled (part of right) -->
    <circle cx="88" cy="90" r="48" clip-path="url(#clipB3)" fill="#22c55e" opacity="0.3"/>
    <!-- Circle B outline on top -->
    <circle cx="132" cy="90" r="48" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <!-- Labels -->
    <text x="72" y="94" text-anchor="middle" font-size="11" fill="#64748b">A</text>
    <text x="148" y="94" text-anchor="middle" font-size="11" fill="#1e7a3e">B</text>
    <!-- Description -->
    <text x="110" y="155" text-anchor="middle" font-size="11" fill="#334155">All rows from B,</text>
    <text x="110" y="170" text-anchor="middle" font-size="11" fill="#334155">matched from A (NULL if none)</text>
  </g>

  <!-- ══════════ FULL OUTER JOIN ══════════ -->
  <g transform="translate(615, 52)">
    <text x="110" y="10" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">FULL OUTER JOIN</text>
    <!-- Both circles filled -->
    <circle cx="88" cy="90" r="48" fill="#ef4444" opacity="0.2"/>
    <circle cx="132" cy="90" r="48" fill="#ef4444" opacity="0.2"/>
    <!-- Both outlines -->
    <circle cx="88" cy="90" r="48" fill="none" stroke="#ef4444" stroke-width="1.2"/>
    <circle cx="132" cy="90" r="48" fill="none" stroke="#ef4444" stroke-width="1.2"/>
    <!-- Labels -->
    <text x="72" y="94" text-anchor="middle" font-size="11" fill="#991b1b">A</text>
    <text x="148" y="94" text-anchor="middle" font-size="11" fill="#991b1b">B</text>
    <!-- Description -->
    <text x="110" y="155" text-anchor="middle" font-size="11" fill="#334155">All rows from both,</text>
    <text x="110" y="170" text-anchor="middle" font-size="11" fill="#334155">NULL where no match</text>
  </g>

  <!-- ══════════ CROSS JOIN ══════════ -->
  <g transform="translate(115, 248)">
    <text x="110" y="10" text-anchor="middle" font-size="13" font-weight="700" fill="#ea580c">CROSS JOIN</text>
    <!-- Grid representation -->
    <rect x="50" y="28" width="36" height="80" rx="4" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
    <text x="68" y="72" text-anchor="middle" font-size="10" fill="#9a3412">A</text>
    <text x="110" y="72" text-anchor="middle" font-size="16" fill="#94a3b8">×</text>
    <rect x="132" y="28" width="36" height="80" rx="4" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
    <text x="150" y="72" text-anchor="middle" font-size="10" fill="#9a3412">B</text>
    <!-- Description -->
    <text x="110" y="130" text-anchor="middle" font-size="11" fill="#334155">Every row in A paired</text>
    <text x="110" y="145" text-anchor="middle" font-size="11" fill="#334155">with every row in B</text>
    <text x="110" y="162" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">(Cartesian product)</text>
  </g>

  <!-- ══════════ SELF JOIN ══════════ -->
  <g transform="translate(365, 248)">
    <text x="110" y="10" text-anchor="middle" font-size="13" font-weight="700" fill="#0891b2">SELF JOIN</text>
    <!-- Single table with loop arrow -->
    <rect x="62" y="36" width="96" height="64" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="1.2"/>
    <text x="110" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#155e75">Table A</text>
    <text x="110" y="80" text-anchor="middle" font-size="10" fill="#475569">as a1, a2</text>
    <!-- Loop arrow -->
    <path d="M 158 52 C 185 40, 192 72, 172 88" fill="none" stroke="#0891b2" stroke-width="1.3"/>
    <polygon points="172,88 168,78 177,81" fill="#0891b2"/>
    <!-- Description -->
    <text x="110" y="120" text-anchor="middle" font-size="11" fill="#334155">Table joined to itself</text>
    <text x="110" y="135" text-anchor="middle" font-size="11" fill="#334155">using two aliases</text>
    <text x="110" y="152" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">(e.g. employees + managers)</text>
  </g>

  <!-- ══════════ LEFT ANTI JOIN ══════════ -->
  <g transform="translate(570, 248)">
    <text x="110" y="10" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">LEFT ANTI JOIN</text>
    <!-- Circle A - only left part filled -->
    <circle cx="88" cy="80" r="42" fill="#6d28d9" opacity="0.2"/>
    <!-- White out the intersection -->
    <circle cx="128" cy="80" r="42" fill="#ffffff"/>
    <!-- Circle B outline -->
    <circle cx="128" cy="80" r="42" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
    <!-- Circle A outline -->
    <circle cx="88" cy="80" r="42" fill="none" stroke="#6d28d9" stroke-width="1.2"/>
    <!-- Labels -->
    <text x="68" y="84" text-anchor="middle" font-size="11" fill="#4c1d95">A</text>
    <text x="146" y="84" text-anchor="middle" font-size="11" fill="#94a3b8">B</text>
    <!-- Description -->
    <text x="110" y="138" text-anchor="middle" font-size="11" fill="#334155">Rows in A with</text>
    <text x="110" y="153" text-anchor="middle" font-size="11" fill="#334155">no match in B</text>
    <text x="110" y="170" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">(LEFT JOIN … WHERE B.key IS NULL)</text>
  </g>

  <!-- Bottom caption -->
  <text x="410" y="428" text-anchor="middle" font-size="12" fill="#64748b">Shaded regions show which rows are returned by each join type</text>
</svg>
