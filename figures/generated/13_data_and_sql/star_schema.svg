<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="520" rx="12" fill="#ffffff" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Star Schema</text>
  <text x="410" y="56" text-anchor="middle" font-size="12" fill="#64748b">Central fact table surrounded by dimension tables — the standard analytics data model</text>

  <!-- ═══════════════ FACT TABLE (center) ═══════════════ -->
  <rect x="280" y="145" width="260" height="260" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="280" y="145" width="260" height="36" rx="10" fill="#f59e0b"/>
  <rect x="280" y="171" width="260" height="10" fill="#f59e0b"/>
  <text x="410" y="169" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">FACT_ORDERS</text>

  <!-- Fact columns -->
  <text x="300" y="206" font-size="12" fill="#92400e">🔑 order_id</text>
  <line x1="296" y1="214" x2="524" y2="214" stroke="#fde68a" stroke-width="0.5"/>
  <text x="300" y="232" font-size="12" fill="#78716c">FK  customer_id</text>
  <line x1="296" y1="240" x2="524" y2="240" stroke="#fde68a" stroke-width="0.5"/>
  <text x="300" y="258" font-size="12" fill="#78716c">FK  store_id</text>
  <line x1="296" y1="266" x2="524" y2="266" stroke="#fde68a" stroke-width="0.5"/>
  <text x="300" y="284" font-size="12" fill="#78716c">FK  product_id</text>
  <line x1="296" y1="292" x2="524" y2="292" stroke="#fde68a" stroke-width="0.5"/>
  <text x="300" y="310" font-size="12" fill="#78716c">FK  date_id</text>
  <line x1="296" y1="318" x2="524" y2="318" stroke="#fde68a" stroke-width="0.5"/>
  <text x="300" y="336" font-size="12" fill="#78716c">FK  promo_id</text>
  <line x1="296" y1="344" x2="524" y2="344" stroke="#fde68a" stroke-width="0.5"/>
  <!-- Measures -->
  <text x="300" y="365" font-size="11" font-weight="600" fill="#b45309">Measures:</text>
  <text x="300" y="383" font-size="12" fill="#78716c">    amount, quantity, discount</text>

  <!-- ═══════════════ DIM_DATE (top) ═══════════════ -->
  <rect x="310" y="68" width="200" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="410" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">DIM_DATE</text>
  <text x="410" y="108" text-anchor="middle" font-size="11" fill="#475569">date_id · year · month · quarter</text>
  <!-- Connector -->
  <line x1="410" y1="120" x2="410" y2="145" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ═══════════════ DIM_CUSTOMER (left) ═══════════════ -->
  <rect x="30" y="168" width="210" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="135" y="190" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">DIM_CUSTOMER</text>
  <text x="135" y="208" text-anchor="middle" font-size="11" fill="#475569">customer_id · name · city · segment</text>
  <!-- Connector -->
  <line x1="240" y1="194" x2="280" y2="232" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ═══════════════ DIM_STORE (left lower) ═══════════════ -->
  <rect x="30" y="258" width="210" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="135" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">DIM_STORE</text>
  <text x="135" y="298" text-anchor="middle" font-size="11" fill="#475569">store_id · name · region · format</text>
  <!-- Connector -->
  <line x1="240" y1="284" x2="280" y2="258" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ═══════════════ DIM_PRODUCT (right) ═══════════════ -->
  <rect x="580" y="168" width="210" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="685" y="190" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">DIM_PRODUCT</text>
  <text x="685" y="208" text-anchor="middle" font-size="11" fill="#475569">product_id · name · category · brand</text>
  <!-- Connector -->
  <line x1="580" y1="194" x2="540" y2="284" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ═══════════════ DIM_PROMO (right lower) ═══════════════ -->
  <rect x="580" y="258" width="210" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="685" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">DIM_PROMO</text>
  <text x="685" y="298" text-anchor="middle" font-size="11" fill="#475569">promo_id · type · discount% · channel</text>
  <!-- Connector -->
  <line x1="580" y1="284" x2="540" y2="336" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <rect x="30" y="430" width="760" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="50" y="446" width="14" height="14" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="72" y="458" font-size="12" fill="#334155"><tspan font-weight="600">Fact table</tspan> — one row per business event (order, click, transaction). Contains FK references + numeric measures.</text>
  <rect x="50" y="470" width="14" height="14" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="72" y="482" font-size="12" fill="#334155"><tspan font-weight="600">Dimension tables</tspan> — descriptive attributes (who, what, where, when). Joined to fact via foreign keys.</text>
</svg>
