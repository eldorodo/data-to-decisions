<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="520" viewBox="0 0 700 520">
  <defs>
    <style>
      .rf-title { font-family:'Segoe UI',Arial,sans-serif; font-size:14px; font-weight:bold; fill:#0f172a; }
      .rf-h     { font-family:'Segoe UI',Arial,sans-serif; font-size:13px; font-weight:bold; }
      .rf-s     { font-family:'Segoe UI',Arial,sans-serif; font-size:10.5px; fill:#64748b; }
      .rf-note  { font-family:'Segoe UI',Arial,sans-serif; font-size:9.5px; fill:#64748b; font-style:italic; }
      .rf-pred  { font-family:'Segoe UI',Arial,sans-serif; font-size:12px; font-weight:bold; }
      .rf-cap   { font-family:'Segoe UI',Arial,sans-serif; font-size:10.5px; fill:#64748b; font-style:italic; }
    </style>
    <marker id="rfa" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" class="rf-title">Random Forest: Independent Trees on Bootstrap Samples &#x2192; Majority Vote</text>

  <!-- ═══ Training Data ═══ -->
  <rect x="250" y="40" width="200" height="48" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="350" y="60" text-anchor="middle" class="rf-h" fill="#1e40af">Training Data</text>
  <text x="350" y="76" text-anchor="middle" class="rf-s">N rows, p features</text>

  <!-- Arrows from Training Data to 3 Bootstrap boxes -->
  <line x1="280" y1="88" x2="120" y2="118" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rfa)"/>
  <line x1="350" y1="88" x2="350" y2="118" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rfa)"/>
  <line x1="420" y1="88" x2="580" y2="118" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rfa)"/>

  <!-- Feature subset note (centered) -->
  <rect x="245" y="96" width="210" height="22" rx="4" fill="#fefce8" stroke="#fde047" stroke-width="0.8"/>
  <text x="350" y="111" text-anchor="middle" class="rf-note" fill="#92400e">Random feature subsets at each split &#x2192; trees are decorrelated</text>

  <!-- ═══ Bootstrap 1 ═══ -->
  <rect x="30" y="122" width="180" height="48" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.4"/>
  <text x="120" y="142" text-anchor="middle" class="rf-h" fill="#92400e">Bootstrap</text>
  <text x="120" y="158" text-anchor="middle" class="rf-s">Sample 1 (~63% unique)</text>

  <!-- ═══ Bootstrap 2 ═══ -->
  <rect x="260" y="122" width="180" height="48" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.4"/>
  <text x="350" y="142" text-anchor="middle" class="rf-h" fill="#92400e">Bootstrap</text>
  <text x="350" y="158" text-anchor="middle" class="rf-s">Sample 2 (~63% unique)</text>

  <!-- ═══ Bootstrap 3 ═══ -->
  <rect x="490" y="122" width="180" height="48" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.4"/>
  <text x="580" y="142" text-anchor="middle" class="rf-h" fill="#92400e">Bootstrap</text>
  <text x="580" y="158" text-anchor="middle" class="rf-s">Sample 3 (~63% unique)</text>

  <!-- Arrows Bootstrap → Tree -->
  <line x1="120" y1="170" x2="120" y2="198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rfa)"/>
  <line x1="350" y1="170" x2="350" y2="198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rfa)"/>
  <line x1="580" y1="170" x2="580" y2="198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rfa)"/>

  <!-- ═══ Tree 1 ═══ -->
  <rect x="30" y="202" width="180" height="48" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.4"/>
  <text x="120" y="222" text-anchor="middle" class="rf-h" fill="#166534">Tree 1</text>
  <text x="120" y="238" text-anchor="middle" class="rf-s">(random feature subset)</text>

  <!-- ═══ Tree 2 ═══ -->
  <rect x="260" y="202" width="180" height="48" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.4"/>
  <text x="350" y="222" text-anchor="middle" class="rf-h" fill="#166534">Tree 2</text>
  <text x="350" y="238" text-anchor="middle" class="rf-s">(different random subset)</text>

  <!-- ═══ Tree 3 ═══ -->
  <rect x="490" y="202" width="180" height="48" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.4"/>
  <text x="580" y="222" text-anchor="middle" class="rf-h" fill="#166534">Tree 3</text>
  <text x="580" y="238" text-anchor="middle" class="rf-s">(different random subset)</text>

  <!-- Arrows Tree → Prediction -->
  <line x1="120" y1="250" x2="120" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rfa)"/>
  <line x1="350" y1="250" x2="350" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rfa)"/>
  <line x1="580" y1="250" x2="580" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rfa)"/>

  <!-- ═══ Prediction boxes ═══ -->
  <rect x="50" y="282" width="140" height="38" rx="8" fill="#fecaca" stroke="#dc2626" stroke-width="1.4"/>
  <text x="120" y="306" text-anchor="middle" class="rf-pred" fill="#991b1b">FRAUD</text>

  <rect x="280" y="282" width="140" height="38" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.4"/>
  <text x="350" y="306" text-anchor="middle" class="rf-pred" fill="#166534">Legit</text>

  <rect x="510" y="282" width="140" height="38" rx="8" fill="#fecaca" stroke="#dc2626" stroke-width="1.4"/>
  <text x="580" y="306" text-anchor="middle" class="rf-pred" fill="#991b1b">FRAUD</text>

  <!-- Arrows Predictions → Final vote -->
  <line x1="120" y1="320" x2="290" y2="358" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rfa)"/>
  <line x1="350" y1="320" x2="350" y2="358" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rfa)"/>
  <line x1="580" y1="320" x2="410" y2="358" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rfa)"/>

  <!-- ═══ Final Vote ═══ -->
  <rect x="230" y="362" width="240" height="44" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="350" y="390" text-anchor="middle" class="rf-pred" fill="#991b1b" font-size="14">Final: FRAUD  (2 of 3 votes)</text>

  <!-- Caption -->
  <text x="350" y="440" text-anchor="middle" class="rf-cap">Three trees are trained on independent bootstrap samples, each using random feature subsets at every split.</text>
  <text x="350" y="455" text-anchor="middle" class="rf-cap">Their predictions are aggregated by majority vote (classification) or averaging (regression).</text>
</svg>