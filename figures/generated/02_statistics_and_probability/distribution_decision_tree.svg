<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="940" height="520" viewBox="0 0 940 520">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 17px; font-weight: bold; fill: #0f172a; }
      .clbl { font-size: 14px; font-weight: bold; fill: #0f172a; }
      .csub { font-size: 11px; fill: #475569; }
      .qlbl { font-size: 13px; font-weight: bold; fill: #1e3a5f; }
      .qsub { font-size: 11px; fill: #475569; }
      .dn   { font-size: 13px; font-weight: bold; fill: #1e3a5f; }
      .dd   { font-size: 10.5px; fill: #475569; }
      .br   { font-size: 11px; fill: #0f766e; font-style: italic; }
      .tip  { font-size: 11px; fill: #64748b; font-style: italic; }
      .a    { fill: none; stroke: #94a3b8; stroke-width: 1.5; marker-end: url(#ah); }
    </style>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="470" y="28" text-anchor="middle" class="title">Choosing a Distribution in Practice</text>

  <!-- Question box -->
  <rect x="280" y="44" width="380" height="44" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.4"/>
  <text x="470" y="64" text-anchor="middle" class="qlbl">What kind of variable are you modelling?</text>
  <text x="470" y="80" text-anchor="middle" class="qsub">(Ask: can I count it, or is it continuous?)</text>

  <!-- Branch labels -->
  <text x="240" y="110" text-anchor="middle" class="br">if discrete</text>
  <text x="700" y="110" text-anchor="middle" class="br">if continuous</text>

  <!-- Top arrows -->
  <line x1="380" y1="88" x2="252" y2="124" class="a"/>
  <line x1="560" y1="88" x2="688" y2="124" class="a"/>

  <!-- DISCRETE -->
  <rect x="112" y="128" width="280" height="38" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.3"/>
  <text x="252" y="147" text-anchor="middle" class="clbl">DISCRETE</text>
  <text x="252" y="161" text-anchor="middle" class="csub">(countable outcomes)</text>

  <!-- CONTINUOUS -->
  <rect x="548" y="128" width="280" height="38" rx="10" fill="#fef9c3" stroke="#fbbf24" stroke-width="1.3"/>
  <text x="688" y="147" text-anchor="middle" class="clbl">CONTINUOUS</text>
  <text x="688" y="161" text-anchor="middle" class="csub">(real-valued outcomes)</text>

  <!-- Discrete arrows to 3 cards -->
  <line x1="172" y1="166" x2="105" y2="206" class="a"/>
  <line x1="252" y1="166" x2="252" y2="206" class="a"/>
  <line x1="332" y1="166" x2="399" y2="206" class="a"/>

  <!-- Continuous arrows to 3 cards -->
  <line x1="608" y1="166" x2="565" y2="338" class="a"/>
  <line x1="688" y1="166" x2="720" y2="338" class="a"/>
  <line x1="768" y1="166" x2="870" y2="338" class="a"/>

  <!-- ═══ DISCRETE CARDS (row at y=210) ═══ -->
  <!-- Card width=170, gap=17 -->
  <!-- Card 1: x=18  Card 2: x=205  Card 3: x=392 -->

  <!-- Bernoulli -->
  <rect x="18" y="210" width="170" height="80" rx="9" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.1"/>
  <text x="103" y="233" text-anchor="middle" class="dn">Bernoulli(p)</text>
  <line x1="42" y1="239" x2="164" y2="239" stroke="#e2e8f0" stroke-width="0.7"/>
  <text x="103" y="255" text-anchor="middle" class="dd">One 0/1 trial</text>
  <text x="103" y="268" text-anchor="middle" class="dd">(e.g. click / no-click)</text>
  <text x="103" y="283" text-anchor="middle" class="dd">E[X] = p</text>

  <!-- Binomial -->
  <rect x="205" y="210" width="170" height="80" rx="9" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.1"/>
  <text x="290" y="233" text-anchor="middle" class="dn">Binomial(n, p)</text>
  <line x1="229" y1="239" x2="351" y2="239" stroke="#e2e8f0" stroke-width="0.7"/>
  <text x="290" y="255" text-anchor="middle" class="dd">Count successes</text>
  <text x="290" y="268" text-anchor="middle" class="dd">in n fixed trials</text>
  <text x="290" y="283" text-anchor="middle" class="dd">E[X] = np</text>

  <!-- Poisson -->
  <rect x="392" y="210" width="170" height="80" rx="9" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.1"/>
  <text x="477" y="233" text-anchor="middle" class="dn">Poisson(&#955;)</text>
  <line x1="416" y1="239" x2="538" y2="239" stroke="#e2e8f0" stroke-width="0.7"/>
  <text x="477" y="255" text-anchor="middle" class="dd">Count of events</text>
  <text x="477" y="268" text-anchor="middle" class="dd">in a fixed interval</text>
  <text x="477" y="283" text-anchor="middle" class="dd">E[X] = &#955;</text>

  <!-- ═══ CONTINUOUS CARDS (row at y=342) ═══ -->
  <!-- Card width=175, gap=15 -->
  <!-- Card 1: x=480  Card 2: x=670  Card 3: x=770 -->
  <!-- Centred under CONTINUOUS box (548..828, centre=688) -->
  <!-- 3 cards of 170 + 2 gaps of 15 = 540. start = 688 - 270 = 418 -->
  <!-- Card 1: x=418  Card 2: x=603  Card 3: x=788 → 788+170=958 OK -->

  <!-- Gaussian -->
  <rect x="418" y="342" width="170" height="80" rx="9" fill="#e8e0f0" stroke="#a78bfa" stroke-width="1.1"/>
  <text x="503" y="365" text-anchor="middle" class="dn">Gaussian(&#956;, &#963;&#178;)</text>
  <line x1="442" y1="371" x2="564" y2="371" stroke="#e2e8f0" stroke-width="0.7"/>
  <text x="503" y="387" text-anchor="middle" class="dd">Continuous symmetric</text>
  <text x="503" y="400" text-anchor="middle" class="dd">noise / measurements</text>
  <text x="503" y="415" text-anchor="middle" class="dd">e.g. height, sensor errors</text>

  <!-- Exponential -->
  <rect x="603" y="342" width="170" height="80" rx="9" fill="#e8e0f0" stroke="#a78bfa" stroke-width="1.1"/>
  <text x="688" y="365" text-anchor="middle" class="dn">Exponential(&#955;)</text>
  <line x1="627" y1="371" x2="749" y2="371" stroke="#e2e8f0" stroke-width="0.7"/>
  <text x="688" y="387" text-anchor="middle" class="dd">Waiting time until</text>
  <text x="688" y="400" text-anchor="middle" class="dd">the next event</text>
  <text x="688" y="415" text-anchor="middle" class="dd">e.g. time between clicks</text>

  <!-- Beta -->
  <rect x="788" y="342" width="148" height="80" rx="9" fill="#e8e0f0" stroke="#a78bfa" stroke-width="1.1"/>
  <text x="862" y="365" text-anchor="middle" class="dn">Beta(&#945;, &#946;)</text>
  <line x1="808" y1="371" x2="916" y2="371" stroke="#e2e8f0" stroke-width="0.7"/>
  <text x="862" y="387" text-anchor="middle" class="dd">Parameter that is</text>
  <text x="862" y="400" text-anchor="middle" class="dd">itself a probability</text>
  <text x="862" y="415" text-anchor="middle" class="dd">e.g. Bayesian prior</text>

  <!-- ═══ Tip text ═══ -->
  <text x="470" y="468" text-anchor="middle" class="tip">Quick tip: ask &#x201C;Can I count this, or is it continuous?&#x201D; then pick the branch.</text>
  <text x="470" y="488" text-anchor="middle" class="tip">Treat distributions as useful approximations, not literal truth.</text>

  <!-- Colour legend -->
  <rect x="340" y="505" width="12" height="12" rx="3" fill="#dbeafe" stroke="#60a5fa" stroke-width="0.7"/>
  <text x="357" y="516" class="dd" fill="#475569">Discrete</text>
  <rect x="410" y="505" width="12" height="12" rx="3" fill="#e8e0f0" stroke="#a78bfa" stroke-width="0.7"/>
  <text x="427" y="516" class="dd" fill="#475569">Continuous</text>
</svg>
