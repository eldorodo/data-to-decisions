<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="740" height="260" viewBox="0 0 740 260">
  <defs>
    <style>
      .np-title { font-family:'Segoe UI',Arial,sans-serif; font-size:16px; font-weight:bold; fill:#0f172a; }
      .np-sub   { font-family:'Segoe UI',Arial,sans-serif; font-size:12px; font-weight:bold; fill:#475569; }
      .np-h     { font-family:'Segoe UI',Arial,sans-serif; font-size:15px; font-weight:bold; }
      .np-t     { font-family:'Segoe UI',Arial,sans-serif; font-size:11.5px; fill:#475569; }
      .np-cap   { font-family:'Segoe UI',Arial,sans-serif; font-size:11px; fill:#64748b; font-style:italic; }
    </style>
    <marker id="npa" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="npb" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto-start-reverse">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="370" y="24" text-anchor="middle" class="np-title">NumPy vs Pandas: Two Complementary Mental Models</text>

  <!-- Subtitle -->
  <text x="370" y="46" text-anchor="middle" class="np-sub">NumPy = compute engine  |  Pandas = labeled data interface</text>

  <!-- NumPy box -->
  <rect x="20" y="60" width="310" height="150" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="40" y="86" class="np-h" fill="#1e40af">NumPy</text>
  <line x1="40" y1="94" x2="310" y2="94" stroke="#bfdbfe" stroke-width="1"/>
  <text x="40" y="114" class="np-t">Core object: ndarray</text>
  <text x="40" y="132" class="np-t">Homogeneous numeric arrays</text>
  <text x="40" y="150" class="np-t">Integer-position indexing</text>
  <text x="40" y="168" class="np-t">Best for math and linear algebra</text>
  <text x="40" y="186" class="np-t">Very fast array operations</text>

  <!-- Double arrow -->
  <line x1="342" y1="135" x2="396" y2="135" stroke="#94a3b8" stroke-width="1.8" marker-start="url(#npb)" marker-end="url(#npa)"/>

  <!-- Pandas box -->
  <rect x="410" y="60" width="310" height="150" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="1.6"/>
  <text x="430" y="86" class="np-h" fill="#166534">Pandas</text>
  <line x1="430" y1="94" x2="700" y2="94" stroke="#bbf7d0" stroke-width="1"/>
  <text x="430" y="114" class="np-t">Core object: DataFrame</text>
  <text x="430" y="132" class="np-t">Mixed-type tabular data</text>
  <text x="430" y="150" class="np-t">Labeled indexes and columns</text>
  <text x="430" y="168" class="np-t">Best for joins and wrangling</text>
  <text x="430" y="186" class="np-t">Built on top of NumPy</text>

  <!-- Caption -->
  <text x="370" y="240" text-anchor="middle" class="np-cap">Use NumPy when the data is already a matrix. Use Pandas when rows, columns, labels, and joins matter.</text>
</svg>