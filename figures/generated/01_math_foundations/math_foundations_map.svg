<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="500" viewBox="0 0 860 500">
  <defs>
    <style>
      .mf-title { font-family:'Segoe UI',Arial,sans-serif; font-size:18px; font-weight:bold; fill:#0f172a; }
      .mf-box   { font-family:'Segoe UI',Arial,sans-serif; font-size:16px; font-weight:bold; }
      .mf-sub   { font-family:'Segoe UI',Arial,sans-serif; font-size:12.5px; fill:#475569; }
      .mf-center{ font-family:'Segoe UI',Arial,sans-serif; font-size:17px; font-weight:bold; fill:#1e3a5f; }
      .mf-cap   { font-family:'Segoe UI',Arial,sans-serif; font-size:12px; fill:#64748b; font-style:italic; }
    </style>
    <marker id="mfa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Outer frame -->
  <rect x="10" y="10" width="840" height="480" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="430" y="48" text-anchor="middle" class="mf-title">Math Foundations Used Throughout Machine Learning</text>

  <!-- Top-left: Linear Algebra -->
  <rect x="50" y="80" width="280" height="140" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/>
  <text x="190" y="112" text-anchor="middle" class="mf-box" fill="#1e40af">Linear Algebra</text>
  <line x1="80" y1="122" x2="300" y2="122" stroke="#bfdbfe" stroke-width="1"/>
  <text x="190" y="146" text-anchor="middle" class="mf-sub">vectors and matrices</text>
  <text x="190" y="166" text-anchor="middle" class="mf-sub">eigenvalues and PCA</text>
  <text x="190" y="186" text-anchor="middle" class="mf-sub">projection and geometry</text>

  <!-- Top-right: Statistics -->
  <rect x="530" y="80" width="280" height="140" rx="14" fill="#dcfce7" stroke="#22c55e" stroke-width="1.8"/>
  <text x="670" y="112" text-anchor="middle" class="mf-box" fill="#166534">Statistics</text>
  <line x1="560" y1="122" x2="780" y2="122" stroke="#bbf7d0" stroke-width="1"/>
  <text x="670" y="146" text-anchor="middle" class="mf-sub">distributions</text>
  <text x="670" y="166" text-anchor="middle" class="mf-sub">expectation and Bayes</text>
  <text x="670" y="186" text-anchor="middle" class="mf-sub">uncertainty and inference</text>

  <!-- Center: Math for ML -->
  <rect x="330" y="235" width="200" height="60" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="430" y="272" text-anchor="middle" class="mf-center">Math for ML</text>

  <!-- Bottom-left: Information -->
  <rect x="50" y="310" width="280" height="140" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="190" y="342" text-anchor="middle" class="mf-box" fill="#92400e">Information</text>
  <line x1="80" y1="352" x2="300" y2="352" stroke="#fde68a" stroke-width="1"/>
  <text x="190" y="376" text-anchor="middle" class="mf-sub">entropy</text>
  <text x="190" y="396" text-anchor="middle" class="mf-sub">cross-entropy</text>
  <text x="190" y="416" text-anchor="middle" class="mf-sub">KL divergence</text>

  <!-- Bottom-right: Optimization -->
  <rect x="530" y="310" width="280" height="140" rx="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.8"/>
  <text x="670" y="342" text-anchor="middle" class="mf-box" fill="#5b21b6">Optimization</text>
  <line x1="560" y1="352" x2="780" y2="352" stroke="#ddd6fe" stroke-width="1"/>
  <text x="670" y="376" text-anchor="middle" class="mf-sub">gradients</text>
  <text x="670" y="396" text-anchor="middle" class="mf-sub">chain rule</text>
  <text x="670" y="416" text-anchor="middle" class="mf-sub">descent and updates</text>

  <!-- Arrows from 4 boxes to center -->
  <line x1="280" y1="220" x2="345" y2="248" stroke="#64748b" stroke-width="1.8" marker-end="url(#mfa)"/>
  <line x1="580" y1="220" x2="515" y2="248" stroke="#64748b" stroke-width="1.8" marker-end="url(#mfa)"/>
  <line x1="280" y1="310" x2="345" y2="282" stroke="#64748b" stroke-width="1.8" marker-end="url(#mfa)"/>
  <line x1="580" y1="310" x2="515" y2="282" stroke="#64748b" stroke-width="1.8" marker-end="url(#mfa)"/>

  <!-- Caption -->
  <text x="430" y="478" text-anchor="middle" class="mf-cap">These four areas are the recurring language behind models, loss functions, and evaluation.</text>
</svg>